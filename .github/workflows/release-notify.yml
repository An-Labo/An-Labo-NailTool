name: Release Discord Notification

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.NAILTOOL_UPDATE_WEBHOOK }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          # bodyが長すぎる場合は切り詰め（Discord embed descriptionは4096文字制限）
          TRIMMED_BODY="${RELEASE_BODY:0:3800}"
          if [ ${#RELEASE_BODY} -gt 3800 ]; then
            TRIMMED_BODY="${TRIMMED_BODY}..."
          fi

          # JSON用にエスケープ（改行・特殊文字対策）
          ESCAPED_BODY=$(printf '%s' "$TRIMMED_BODY" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')

          curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "{
              \"username\": \"An-Labo NailTool\",
              \"embeds\": [{
                \"title\": \"An-Labo NailTool ${RELEASE_TAG} をリリースしました\",
                \"url\": \"${RELEASE_URL}\",
                \"description\": ${ESCAPED_BODY},
                \"color\": 5814783,
                \"footer\": {
                  \"text\": \"VCC から更新できます\"
                }
              }]
            }" \
            "$DISCORD_WEBHOOK"
