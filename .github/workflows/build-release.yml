name: Build Release

on:
  workflow_dispatch: 
  push:
    branches: 
      - main
    paths: 
      - Packages/world.anlabo.mdnailtool/package.json
     
env:
  packageName: "world.anlabo.mdnailtool"
  
permissions: 
  contents: write
  
jobs: 
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: get version
        id: version
        uses: notiz-dev/github-action-json-property@a5a9c668b16513c737c3e1f8956772c99c73f6e8
        with:
          path: "Packages/${{env.packageName}}/package.json"
          prop_path: "version"
          
      - name: Set Environment Variables
        run: |
          echo "zipFile=${{ env.packageName }}-${{ steps.version.outputs.prop }}".zip >> $GITHUB_ENV
          
      - name: Create Zip
        uses: thedoctor0/zip-release@a24011d8d445e4da5935a7e73c1f98e22a439464
        with:
          type: "zip"
          directory: "Packages/${{env.packageName}}/"
          filename: "../../${{env.zipFile}}"
          
      - run: find "Packages/${{env.packageName}}/" -name \*.meta >> metaList

      - name: Get commit message
        id: commit_msg
        run: |
          SUBJECT=$(git log -1 --pretty=%s)
          BODY=$(git log -1 --pretty=%b)
          if [ -n "$BODY" ]; then
            FULL="${SUBJECT}
          ${BODY}"
          else
            FULL=$(echo "$SUBJECT" | sed 's/^\(Release [0-9.]*\) /\1\n/')
          fi
          echo "body<<EOFBODY" >> $GITHUB_OUTPUT
          echo "$FULL" >> $GITHUB_OUTPUT
          echo "EOFBODY" >> $GITHUB_OUTPUT

      - name: Make Release
        uses: softprops/action-gh-release@1e07f4398721186383de40550babbdf2b84acfc5
        with:
          tag_name: ${{ steps.version.outputs.prop }}
          body: ${{ steps.commit_msg.outputs.body }}
          files: |
            ${{ env.zipFile }}
            Packages/${{ env.packageName }}/package.json

      - name: Update docs/vpm.json
        run: |
          node --version
          PACKAGE_NAME="${{ env.packageName }}" node tools/update-vpm-json.mjs

      - name: Commit vpm.json if changed
        run: |
          set -e
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/vpm.json
          git commit -m "chore(vpm): update vpm.json for ${{ steps.version.outputs.prop }}"

      - name: Push changes
        run: |
          git push

      - name: Wait for GitHub Pages deployment
        if: success()
        run: |
          echo "Waiting for GitHub Pages to deploy vpm.json..."
          for i in $(seq 1 12); do
            sleep 15
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://an-labo.github.io/An-Labo-NailTool/vpm.json")
            CONTENT=$(curl -s "https://an-labo.github.io/An-Labo-NailTool/vpm.json" | grep -o '"version":"[^"]*"' | tail -1)
            echo "  Check $i: HTTP $STATUS, latest=$CONTENT"
            if echo "$CONTENT" | grep -q "${{ steps.version.outputs.prop }}"; then
              echo "vpm.json updated successfully!"
              break
            fi
          done

      - name: Discord Notification
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.NAILTOOL_UPDATE_WEBHOOK }}
          VERSION: ${{ steps.version.outputs.prop }}
          BODY: ${{ steps.commit_msg.outputs.body }}
        run: |
          ESCAPED_BODY=$(printf '%s' "$BODY" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')
          curl -s -o /dev/null \
            -H "Content-Type: application/json" \
            -d "{
              \"username\": \"An-Labo NailTool\",
              \"embeds\": [{
                \"title\": \"An-Labo NailTool ${VERSION} をリリースしました\",
                \"url\": \"https://github.com/An-Labo/An-Labo-NailTool/releases/tag/${VERSION}\",
                \"description\": ${ESCAPED_BODY},
                \"color\": 5814783,
                \"footer\": {
                  \"text\": \"VCC から更新できます\"
                }
              }]
            }" \
            "$DISCORD_WEBHOOK"
